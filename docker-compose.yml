services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    expose:
      - "80"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  caddy_data:
